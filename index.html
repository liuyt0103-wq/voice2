<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SpectraLab - 极简音频工作站</title>
    <style>
        :root {
            --bg-color: #F2F2F7;
            --accent-orange: #FF5733;
            --accent-green: #34C759;
            --text-black: #1C1C1E;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-black);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro SC", "PingFang SC", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; /* 适配移动端动态高度 */
            overflow: hidden;
        }

        #app-wrapper {
            width: 100%;
            max-width: 430px;
            height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom) 24px;
            position: relative;
        }

        /* 顶部导航 */
        .header {
            padding: 30px 0 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .header h1 { font-size: 26px; font-weight: 800; margin: 0; letter-spacing: -1px; line-height: 1.1; }
        .status-badge { 
            font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 12px;
            background: #eee; color: #888; transition: 0.3s;
        }
        .status-active { background: #FFE5E0; color: var(--accent-orange); }

        /* 中央圆盘展示区 */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .record-disk {
            width: 280px; height: 280px;
            background: var(--accent-orange);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 20px 40px rgba(255, 87, 51, 0.3);
            position: relative;
            z-index: 2;
        }
        .disk-info { font-size: 14px; opacity: 0.9; margin-bottom: 5px; font-weight: 500; }
        .timer { font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums; }

        /* 实时波形蒙版 */
        #liveWaveCanvas {
            position: absolute;
            width: 100%; height: 80px;
            pointer-events: none;
            z-index: 3;
        }

        /* 底部控制面板 */
        .control-shelf {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-btn {
            border: none; background: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            color: #8E8E93; transition: 0.2s;
        }
        .action-btn span { font-size: 11px; font-weight: 600; }
        .action-btn:active { transform: scale(0.9); }
        .action-btn.active { color: var(--text-black); }
        .action-btn.disabled { opacity: 0.2; pointer-events: none; }

        .rec-trigger {
            width: 72px; height: 72px;
            background: #000; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .rec-icon { width: 24px; height: 24px; border: 3px solid #fff; border-radius: 50%; transition: 0.3s; }
        .recording .rec-icon { background: var(--accent-orange); border-color: var(--accent-orange); border-radius: 4px; }

        /* 隐藏的导出用画布 */
        #exportCanvas, #fullWaveCanvas { display: none; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div class="header">
        <h1>音频剪辑<br>分享实验室</h1>
        <div id="status-badge" class="status-badge">READY</div>
    </div>

    <div class="main-stage">
        <canvas id="liveWaveCanvas"></canvas>
        <div class="record-disk" id="disk-ui">
            <div class="disk-info">当前录制时长</div>
            <div id="timer" class="timer">00:00</div>
        </div>
        <p style="color:#AEAEB2; font-size: 13px; margin-top: 30px;">完整记录您的每一秒音频波动</p>
    </div>

    <div class="control-shelf">
        <button class="action-btn active" onclick="location.reload()">
            <div style="font-size: 24px;">↺</div>
            <span>重置</span>
        </button>

        <button id="rec-btn" class="action-btn active">
            <div class="rec-trigger">
                <div class="rec-icon"></div>
            </div>
        </button>

        <div style="display: flex; gap: 15px;">
            <button id="save-video" class="action-btn disabled">
                <div style="font-size: 24px;">🎬</div>
                <span>保存视频</span>
            </button>
            <button id="save-image" class="action-btn disabled">
                <div style="font-size: 24px;">🖼️</div>
                <span>保存图片</span>
            </button>
        </div>
    </div>
</div>

<!-- 用于合成视频的画布 -->
<canvas id="exportCanvas" width="1080" height="1920"></canvas>
<!-- 用于生成静态长图波形的画布 -->
<canvas id="fullWaveCanvas"></canvas>

<script>
    let audioCtx, analyser, dataArray, stream;
    let mediaRecorder, recordedChunks = [];
    let isRecording = false;
    let startTime;
    let historyData = []; // 用于存储完整的音频采样，生成静态图

    const recBtn = document.getElementById('rec-btn');
    const saveVideoBtn = document.getElementById('save-video');
    const saveImageBtn = document.getElementById('save-image');
    const timerDisplay = document.getElementById('timer');
    const statusBadge = document.getElementById('status-badge');
    const liveCanvas = document.getElementById('liveWaveCanvas');
    const fullWaveCanvas = document.getElementById('fullWaveCanvas');

    // 初始化画布
    function initCanvas() {
        liveCanvas.width = liveCanvas.clientWidth * window.devicePixelRatio;
        liveCanvas.height = liveCanvas.clientHeight * window.devicePixelRatio;
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    recBtn.onclick = async () => {
        if (!isRecording) {
            try {
                await startEngine();
                isRecording = true;
                startTime = Date.now();
                historyData = []; 
                recBtn.classList.add('recording');
                statusBadge.innerText = "RECORDING";
                statusBadge.classList.add('status-active');
                [saveVideoBtn, saveImageBtn].forEach(b => b.classList.add('disabled'));
                
                startMediaRecorder();
                updateUI();
            } catch (e) { alert("请允许麦克风权限以开始录制"); }
        } else {
            stopEngine();
        }
    };

    async function startEngine() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        render();
    }

    function startMediaRecorder() {
        recordedChunks = [];
        const exportCanvas = document.getElementById('exportCanvas');
        const vStream = exportCanvas.captureStream(30);
        const combined = new MediaStream([...vStream.getVideoTracks(), ...stream.getAudioTracks()]);
        
        mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            [saveVideoBtn, saveImageBtn].forEach(b => b.classList.remove('disabled'));
        };
        mediaRecorder.start();
    }

    function stopEngine() {
        isRecording = false;
        mediaRecorder.stop();
        stream.getTracks().forEach(t => t.stop());
        recBtn.classList.remove('recording');
        statusBadge.innerText = "FINISHED";
        statusBadge.classList.remove('status-active');
    }

    function updateUI() {
        if (!isRecording) return;
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const s = (elapsed % 60).toString().padStart(2, '0');
        timerDisplay.innerText = `${m}:${s}`;
        setTimeout(updateUI, 500);
    }

    function render() {
        if (!isRecording) return;
        requestAnimationFrame(render);
        analyser.getByteTimeDomainData(dataArray);

        // 1. 绘制实时圆盘波形
        const ctx = liveCanvas.getContext('2d');
        ctx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        ctx.beginPath();
        let x = 0;
        let step = liveCanvas.width / dataArray.length;
        for(let i=0; i<dataArray.length; i++) {
            let v = dataArray[i] / 128.0;
            let y = v * liveCanvas.height / 2;
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            x += step;
        }
        ctx.stroke();

        // 2. 记录采样点用于生成静态图
        // 记录平均绝对振幅
        let sum = 0;
        for(let i=0; i<dataArray.length; i++) {
            sum += Math.abs(dataArray[i] - 128);
        }
        historyData.push(sum / dataArray.length);

        // 3. 渲染视频帧 (省略背景渲染逻辑以保持简洁，逻辑同上一版)
        drawVideoFrame();
    }

    // 绘制视频帧逻辑
    function drawVideoFrame() {
        const exCanvas = document.getElementById('exportCanvas');
        const exCtx = exCanvas.getContext('2d');
        exCtx.fillStyle = "#F2F2F7";
        exCtx.fillRect(0,0,1080,1920);
        // 绘制橙色圆
        exCtx.fillStyle = "#FF5733";
        exCtx.beginPath(); exCtx.arc(540, 960, 350, 0, Math.PI*2); exCtx.fill();
        // 绘制波形
        exCtx.strokeStyle = "white"; exCtx.lineWidth = 12; exCtx.beginPath();
        let x = 200; let step = 680 / dataArray.length;
        for(let i=0; i<dataArray.length; i++) {
            let v = dataArray[i] / 128.0;
            let y = 960 + (v - 1) * 300;
            if(i===0) exCtx.moveTo(x,y); else exCtx.lineTo(x,y);
            x += step;
        }
        exCtx.stroke();
    }

    // 核心功能：生成静态完整波形图
    saveImageBtn.onclick = () => {
        if (historyData.length === 0) return;
        
        const width = 2000; // 长图宽度
        const height = 400;
        fullWaveCanvas.width = width;
        fullWaveCanvas.height = height;
        const ctx = fullWaveCanvas.getContext('2d');

        // 绘制白色背景
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, width, height);

        // 绘制黑色简约波形线
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.lineJoin = "round";
        ctx.beginPath();

        const step = width / historyData.length;
        for(let i=0; i<historyData.length; i++) {
            const amp = (historyData[i] / 64) * (height / 2); // 缩放振幅
            const x = i * step;
            // 绘制上下对称的波形
            if(i === 0) ctx.moveTo(x, height/2 - amp);
            else ctx.lineTo(x, height/2 - amp);
        }
        // 下半部分对称
        for(let i=historyData.length-1; i>=0; i--) {
            const amp = (historyData[i] / 64) * (height / 2);
            const x = i * step;
            ctx.lineTo(x, height/2 + amp);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.fillStyle = "black";
        ctx.fill();

        // 导出
        const link = document.createElement('a');
        link.download = `Waveform_${Date.now()}.png`;
        link.href = fullWaveCanvas.toDataURL('image/png');
        link.click();
    };

    saveVideoBtn.onclick = () => {
        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Recording_${Date.now()}.mp4`;
        a.click();
    };

</script>
</body>
</html>
