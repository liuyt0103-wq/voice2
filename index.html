<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Audio Studio Black</title>
    <style>
        :root {
            --bg-ios: #F9F9F9;
            --ios-black: #000000;
            --ios-dark-gray: #1C1C1E;
            --ios-light-gray: #E5E5EA;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-ios);
            color: var(--ios-black);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        #app-shell {
            width: 100%;
            max-width: 430px;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom) 24px;
            position: relative;
        }

        /* 顶部竖条频谱 - 纯黑风格 */
        .top-section {
            padding: 50px 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #bar-visualizer {
            width: 100%;
            height: 140px;
        }

        /* 中间核心录音区域 */
        .stage {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 堆叠的黑色圆盘 */
        .disk {
            position: absolute;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .disk-bottom {
            width: 250px; height: 250px;
            background: #E0E0E0;
            transform: translateX(40px) translateY(30px);
            z-index: 1;
        }

        .disk-middle {
            width: 250px; height: 250px;
            background: #BDBDBD;
            transform: translateX(-30px) translateY(-20px);
            z-index: 2;
        }

        .disk-main {
            width: 280px; height: 280px;
            background: var(--ios-black);
            z-index: 3;
            color: white;
            cursor: pointer;
        }

        .disk-main:active { transform: scale(0.96); }

        .disk-timer { 
            font-size: 32px; 
            font-weight: 200; 
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
            z-index: 5;
        }

        /* 内部动态纹理 */
        #pattern-ui {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 4;
            opacity: 0.4;
        }

        /* 底部操作 */
        .bottom-nav {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icon-btn {
            background: #F2F2F7;
            border: none; width: 52px; height: 52px;
            border-radius: 16px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 22px;
            color: #333;
            transition: 0.2s;
        }
        .icon-btn:active { background: #E5E5EA; }

        /* 核心录音触发器 */
        .record-trigger {
            width: 76px; height: 76px;
            background: #000;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .record-core {
            width: 24px; height: 24px;
            border: 2px solid #fff;
            border-radius: 50%;
            transition: all 0.3s;
        }
        .is-recording .record-core {
            background: #fff;
            border-radius: 4px;
            transform: scale(0.85);
        }

        .save-group { display: flex; gap: 15px; opacity: 0; pointer-events: none; transition: 0.4s; }
        .save-group.active { opacity: 1; pointer-events: auto; }

        /* 隐藏画布 */
        canvas[style*="display: none"] { display: none; }
        #export-video-canvas, #export-image-canvas { display: none; }
    </style>
</head>
<body>

<div id="app-shell">
    <div class="top-section">
        <!-- 竖条频谱可视化 -->
        <canvas id="bar-visualizer"></canvas>
    </div>

    <div class="stage">
        <div class="disk disk-bottom"></div>
        <div class="disk disk-middle"></div>
        <!-- 主录音按钮圆盘 -->
        <div class="disk disk-main" id="main-record-disk">
            <canvas id="pattern-ui"></canvas>
            <div id="main-timer" class="disk-timer">00:00</div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="icon-btn" onclick="location.reload()">↺</button>
        
        <button id="record-btn" class="record-trigger">
            <div class="record-core"></div>
        </button>

        <div id="save-btns" class="save-group">
            <button id="btn-save-v" class="icon-btn" title="导出视频">🎬</button>
            <button id="btn-save-i" class="icon-btn" title="导出竖条音波图">🖼️</button>
        </div>
    </div>
</div>

<canvas id="export-video-canvas" width="1080" height="1920"></canvas>
<canvas id="export-image-canvas"></canvas>

<script>
    let audioCtx, analyser, dataArray, stream, mediaRecorder;
    let isRecording = false, startTime, recordedChunks = [], historyWaves = [];

    const recordBtn = document.getElementById('record-btn');
    const diskBtn = document.getElementById('main-record-disk');
    const saveGroup = document.getElementById('save-btns');
    const mainTimer = document.getElementById('main-timer');
    const barCanvas = document.getElementById('bar-visualizer');
    const patternCanvas = document.getElementById('pattern-ui');
    
    const bCtx = barCanvas.getContext('2d');
    const pCtx = patternCanvas.getContext('2d');

    function initCanvases() {
        const dpr = window.devicePixelRatio || 1;
        [barCanvas, patternCanvas].forEach(c => {
            c.width = c.clientWidth * dpr;
            c.height = c.clientHeight * dpr;
        });
    }
    window.addEventListener('resize', initCanvases);
    initCanvases();

    // 两个按钮都可以触发录音
    const toggleRecording = async () => {
        if (!isRecording) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 128;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isRecording = true;
                startTime = Date.now();
                historyWaves = [];
                recordBtn.classList.add('is-recording');
                saveGroup.classList.remove('active');
                
                startMediaRecorder();
                loop();
            } catch (e) { alert("麦克风权限未开启"); }
        } else {
            stopRecording();
        }
    };

    recordBtn.onclick = toggleRecording;
    diskBtn.onclick = toggleRecording;

    function startMediaRecorder() {
        recordedChunks = [];
        const evCanvas = document.getElementById('export-video-canvas');
        const vStream = evCanvas.captureStream(30);
        const combined = new MediaStream([...vStream.getVideoTracks(), ...stream.getAudioTracks()]);
        mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9' });
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => saveGroup.classList.add('active');
        mediaRecorder.start();
    }

    function stopRecording() {
        isRecording = false;
        mediaRecorder.stop();
        stream.getTracks().forEach(t => t.stop());
        recordBtn.classList.remove('is-recording');
    }

    function loop() {
        if (!isRecording) return;
        requestAnimationFrame(loop);
        analyser.getByteFrequencyData(dataArray);

        // 1. 绘制顶部竖条频谱 (黑色圆角风格)
        bCtx.clearRect(0, 0, barCanvas.width, barCanvas.height);
        const barW = 10 * (window.devicePixelRatio || 1);
        const gap = 8 * (window.devicePixelRatio || 1);
        for (let i = 0; i < dataArray.length; i++) {
            const h = (dataArray[i] / 255) * barCanvas.height * 0.8;
            bCtx.fillStyle = `rgba(0, 0, 0, ${0.15 + (dataArray[i]/255) * 0.85})`;
            drawRoundedRect(bCtx, i * (barW + gap), barCanvas.height/2 - h/2, barW, h, barW/2);
        }

        // 2. 绘制圆盘内点阵 (白色微光)
        pCtx.clearRect(0, 0, patternCanvas.width, patternCanvas.height);
        pCtx.fillStyle = "rgba(255,255,255,0.7)";
        const energy = dataArray.reduce((a,b)=>a+b, 0) / dataArray.length;
        const dpr = window.devicePixelRatio || 1;
        for (let x = 0; x < 8; x++) {
            for (let y = 0; y < 8; y++) {
                const r = (energy / 255) * 10 * dpr + 2 * dpr;
                pCtx.beginPath();
                pCtx.arc(x * 35*dpr + 20*dpr, y * 35*dpr + 20*dpr, r, 0, Math.PI * 2);
                pCtx.fill();
            }
        }

        // 计时
        const diff = Math.floor((Date.now() - startTime) / 1000);
        mainTimer.innerText = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;

        historyWaves.push(energy);
        renderVideoFrame();
    }

    function drawRoundedRect(ctx, x, y, w, h, r) {
        if (h < r * 2) r = h / 2;
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
        ctx.fill();
    }

    function renderVideoFrame() {
        const evCanvas = document.getElementById('export-video-canvas');
        const ctx = evCanvas.getContext('2d');
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0,0,1080,1920);

        // 绘制黑色背景圆
        ctx.fillStyle = "#000000";
        ctx.beginPath(); ctx.arc(540, 960, 420, 0, Math.PI*2); ctx.fill();

        // 绘制内部动效
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        let x = 240;
        for(let i=0; i<dataArray.length; i+=2) {
            let h = (dataArray[i]/255) * 400;
            drawRoundedRect(ctx, x, 960 - h/2, 25, h, 12);
            x += 45;
        }

        // 时间戳
        ctx.fillStyle = "#ffffff";
        ctx.font = "200 80px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(mainTimer.innerText, 540, 1150);
    }

    // 导出逻辑
    document.getElementById('btn-save-v').onclick = () => {
        const blob = new Blob(recordedChunks, { type: 'video/mp4' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Studio_Record_${Date.now()}.mp4`;
        a.click();
    };

    document.getElementById('btn-save-i').onclick = () => {
        const canvas = document.getElementById('export-image-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1600; canvas.height = 500;
        
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);

        const barW = 8; const gap = 4;
        const totalBars = Math.floor(canvas.width / (barW + gap));
        const step = historyWaves.length / totalBars;
        
        ctx.fillStyle = "#000000";
        for (let i = 0; i < totalBars; i++) {
            const dataIdx = Math.floor(i * step);
            const amp = (historyWaves[dataIdx] || 0) / 100 * (canvas.height * 0.75);
            const h = Math.max(6, amp);
            drawRoundedRect(ctx, i * (barW + gap), canvas.height/2 - h/2, barW, h, barW/2);
        }

        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = `Waveform_Black_${Date.now()}.png`;
        a.click();
    };
</script>

</body>
</html>
