<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpectraLab - 视频录制版</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #4df0d0;
            --dim-color: #1a3a35;
            --text-color: #4df0d0;
            --record-red: #ff4b4b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Consolas', 'PingFang SC', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        #app-container {
            width: 350px;
            height: 750px;
            border: 2px solid #222;
            border-radius: 40px;
            padding: 20px;
            background: #000;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .header { margin-bottom: 15px; }
        .brand { font-weight: bold; font-size: 1.1rem; display: flex; justify-content: space-between; }
        .rec-status { font-size: 0.8rem; color: #444; }
        .rec-active { color: var(--record-red); animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.3; } }

        .audio-level-container { margin: 10px 0; }
        .label { font-size: 0.65rem; margin-bottom: 5px; opacity: 0.8; }
        .level-bar-bg { height: 12px; background: var(--dim-color); width: 100%; border-radius: 2px; }
        #level-bar-fill { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.1s; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 15px 0;
        }

        .btn-circle {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 1px solid var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-size: 0.8rem;
        }

        #main-btn {
            width: 70px; height: 70px;
            background: var(--record-red);
            border: none;
            color: white;
            font-weight: bold;
        }

        #save-btn {
            background: var(--dim-color);
            border: 1px solid var(--accent-color);
            opacity: 0.5;
            pointer-events: none;
        }
        #save-btn.ready { opacity: 1; pointer-events: auto; background: #222; }

        .viz-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .canvas-box {
            border: 1px solid #111;
            position: relative;
            background: rgba(255,255,255,0.02);
        }

        canvas { width: 100%; height: 90px; display: block; }
        .canvas-label { position: absolute; top: 2px; left: 5px; font-size: 0.5rem; opacity: 0.6; }

        .stats {
            font-size: 0.7rem;
            line-height: 1.5;
            margin-top: 15px;
            padding: 10px;
            border-top: 1px solid #111;
        }

        /* 隐藏的导出画布，用于合成视频 */
        #export-canvas { display: none; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <div class="brand">
            <span>SPECTRALAB PRO</span>
            <span id="rec-indicator" class="rec-status">● 录制中</span>
        </div>
        <div class="audio-level-container">
            <div class="label">实时增益: <span id="db-value">-80.0 DB</span></div>
            <div class="level-bar-bg"><div id="level-bar-fill"></div></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-circle" onclick="location.reload()">重置</button>
        <button id="main-btn" class="btn-circle">开始</button>
        <button id="save-btn" class="btn-circle">保存</button>
    </div>

    <div class="viz-section" id="record-area">
        <div class="canvas-box">
            <div class="canvas-label">WAVEFORM 波形</div>
            <canvas id="waveCanvas"></canvas>
        </div>
        <div class="canvas-box">
            <div class="canvas-label">SPECTRUM 频谱</div>
            <canvas id="specCanvas"></canvas>
        </div>
        <div class="canvas-box" style="height: 150px;">
            <div class="canvas-label">PARTICLES 能量粒子</div>
            <canvas id="partCanvas" style="height: 150px;"></canvas>
        </div>
    </div>

    <div class="stats">
        <div>峰值频率: <span id="peak-hz">0.0 HZ</span></div>
        <div>状态: <span id="status-text">待机中</span></div>
        <div style="font-size: 0.6rem; margin-top: 5px; opacity: 0.5;">支持导出同步音频视频文件</div>
    </div>
</div>

<!-- 用于视频合成的隐藏画布 -->
<canvas id="export-canvas" width="400" height="800"></canvas>

<script>
    let audioCtx, analyser, dataArray, source, stream;
    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;

    const mainBtn = document.getElementById('main-btn');
    const saveBtn = document.getElementById('save-btn');
    const statusText = document.getElementById('status-text');
    const recIndicator = document.getElementById('rec-indicator');

    const waveCanvas = document.getElementById('waveCanvas');
    const specCanvas = document.getElementById('specCanvas');
    const partCanvas = document.getElementById('partCanvas');
    const exportCanvas = document.getElementById('export-canvas');
    const exCtx = exportCanvas.getContext('2d');

    // 粒子系统增强版
    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * partCanvas.width;
            this.y = Math.random() * partCanvas.height;
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            this.baseSize = Math.random() * 2 + 1;
            this.size = this.baseSize;
        }
        update(energy) {
            // 能量越大，震动越剧烈，尺寸越大
            const multiplier = 1 + (energy / 40);
            this.x += this.vx * multiplier;
            this.y += this.vy * multiplier;
            this.size = this.baseSize * (1 + energy/60);

            if(this.x < 0 || this.x > partCanvas.width) this.vx *= -1;
            if(this.y < 0 || this.y > partCanvas.height) this.vy *= -1;
        }
        draw(ctx) {
            ctx.fillStyle = '#4df0d0';
            ctx.shadowBlur = this.size * 2;
            ctx.shadowColor = '#4df0d0';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }
    const particles = Array.from({length: 60}, () => new Particle());

    mainBtn.onclick = async () => {
        if (!isRecording) {
            await startEngine();
            startMediaRecorder();
            mainBtn.innerText = "停止";
            mainBtn.style.background = "#333";
            statusText.innerText = "正在录制音频与画面...";
            recIndicator.classList.add('rec-active');
            saveBtn.classList.remove('ready');
            isRecording = true;
        } else {
            mediaRecorder.stop();
            mainBtn.innerText = "完成";
            mainBtn.disabled = true;
            statusText.innerText = "解析完成，请点击保存导出视频";
            recIndicator.classList.remove('rec-active');
            isRecording = false;
        }
    };

    async function startEngine() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        
        requestAnimationFrame(draw);
    }

    function startMediaRecorder() {
        // 1. 获取隐藏合并画布的视频流
        const videoStream = exportCanvas.captureStream(30); // 30 FPS
        
        // 2. 合并麦克风音轨
        const combinedStream = new MediaStream([
            ...videoStream.getVideoTracks(),
            ...stream.getAudioTracks()
        ]);

        // 3. 创建录制器 (优先使用 mp4, 备选 webm)
        const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
        mediaRecorder = new MediaRecorder(combinedStream, { mimeType });

        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            saveBtn.classList.add('ready');
            saveBtn.onclick = downloadVideo;
        };

        mediaRecorder.start();
    }

    function draw() {
        if(!isRecording && mediaRecorder?.state === 'inactive') return;
        requestAnimationFrame(draw);

        const timeData = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(timeData);
        analyser.getByteFrequencyData(dataArray);

        // 各画布绘制逻辑
        renderWave(timeData);
        renderSpec(dataArray);
        renderParticles(dataArray);

        // 合并到导出画布 (用于录制)
        composeExportCanvas();

        // UI 电平更新
        let sum = 0;
        for(let i=0; i<timeData.length; i++) {
            let v = (timeData[i]-128)/128; sum += v*v;
        }
        let db = 20 * Math.log10(Math.sqrt(sum/timeData.length) || 0.00001);
        document.getElementById('level-bar-fill').style.width = Math.min(100, (db+80)*1.2) + "%";
        document.getElementById('db-value').innerText = db.toFixed(1) + " DB";
    }

    function renderWave(data) {
        const ctx = waveCanvas.getContext('2d');
        ctx.clearRect(0,0,waveCanvas.width, waveCanvas.height);
        ctx.strokeStyle = '#4df0d0';
        ctx.beginPath();
        let x = 0;
        for(let i=0; i<data.length; i++) {
            let y = (data[i]/255) * waveCanvas.height;
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            x += waveCanvas.width/data.length;
        }
        ctx.stroke();
    }

    function renderSpec(data) {
        const ctx = specCanvas.getContext('2d');
        ctx.clearRect(0,0,specCanvas.width, specCanvas.height);
        for(let i=0; i<data.length; i+=4) {
            let h = (data[i]/255) * specCanvas.height;
            ctx.fillStyle = `rgba(77, 240, 208, ${data[i]/255 + 0.1})`;
            ctx.fillRect(i * (specCanvas.width/data.length)*4, specCanvas.height-h, 3, h);
        }
    }

    function renderParticles(data) {
        const ctx = partCanvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0,0,partCanvas.width, partCanvas.height);
        let energy = data.slice(0, 20).reduce((a,b)=>a+b, 0) / 20; // 关注低频
        particles.forEach(p => { p.update(energy); p.draw(ctx); });
    }

    function composeExportCanvas() {
        exCtx.fillStyle = '#050505';
        exCtx.fillRect(0,0,exportCanvas.width, exportCanvas.height);
        
        // 绘制标题
        exCtx.fillStyle = '#4df0d0';
        exCtx.font = '20px Consolas';
        exCtx.fillText("SPECTRALAB RECORDING", 20, 40);
        
        // 将各分屏贴到大画布上
        exCtx.drawImage(waveCanvas, 20, 80, 360, 150);
        exCtx.drawImage(specCanvas, 20, 250, 360, 150);
        exCtx.drawImage(partCanvas, 20, 420, 360, 300);
        
        exCtx.font = '14px Consolas';
        exCtx.fillText("PEAK: " + document.getElementById('peak-hz').innerText, 20, 760);
    }

    function downloadVideo() {
        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `SpectraLab_Record_${Date.now()}.mp4`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
